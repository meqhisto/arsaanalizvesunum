<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - İnveco Proje</title>

    <!-- Bootstrap 5 CSS (for compatibility) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS + Custom Styles -->
    <link href="{{ url_for('static', filename='dist/main.css') }}" rel="stylesheet">

    <style>
      body {
        font-family: 'Helvetica Neue', Helvetica, Calibri, Arial, system-ui, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .auth-card {
        background: white;
        border-radius: 1rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        max-width: 600px;
        margin: 2rem auto;
        padding: 2rem;
      }

      .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-logo i {
        font-size: 3rem;
        color: #2563eb;
      }
    </style>
</head>
<body class="bg-gradient-to-br from-primary-600 to-purple-700 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-building text-5xl text-primary-600 mb-4"></i>
                <h4 class="text-xl font-bold text-gray-900">İnveco Proje</h4>
            </div>
            <div class="text-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900">Yeni Hesap Oluştur</h3>
                <p class="text-gray-600 mt-2">Hemen katılın ve yatırım dünyasını keşfedin</p>
            </div>
            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} mb-4 p-3 rounded-lg border-0">
                {{ message }}
                <button type="button" class="ml-4 text-current opacity-70 hover:opacity-100" data-bs-dismiss="alert">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form action="{{ url_for('auth.register') }}" method="post" id="registerForm" onsubmit="return validateForm()" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label for="ad" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>Ad
                        </label>
                        <input type="text" class="form-control w-full" name="ad" id="ad" placeholder="Adınız" required>
                    </div>
                    <div>
                        <label for="soyad" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>Soyad
                        </label>
                        <input type="text" class="form-control w-full" name="soyad" id="soyad" placeholder="Soyadınız" required>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2"></i>E-posta
                        </label>
                        <input type="email" class="form-control w-full" name="email" id="email" placeholder="E-posta adresiniz" required>
                    </div>
                    <div>
                        <label for="telefon" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-phone mr-2"></i>Telefon
                        </label>
                        <input type="tel" class="form-control w-full" name="telefon" id="telefon" pattern="[0-9]{10}" placeholder="5xxxxxxxxx" required>
                    </div>
                </div>

                <div>
                    <label for="firma" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-building mr-2"></i>Firma
                    </label>
                    <input type="text" class="form-control w-full" name="firma" id="firma" placeholder="Firma adınız (opsiyonel)">
                </div>

                <div>
                    <label for="unvan" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-briefcase mr-2"></i>Ünvan
                    </label>
                    <input type="text" class="form-control w-full" name="unvan" id="unvan" placeholder="Ünvanınız (opsiyonel)">
                </div>

                <div>
                    <label for="adres" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-map-marker-alt mr-2"></i>Adres
                    </label>
                    <textarea class="form-control w-full" name="adres" id="adres" rows="3" placeholder="Adresiniz (opsiyonel)"></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Şifre
                        </label>
                        <input type="password" class="form-control w-full" name="password" id="password" placeholder="En az 6 karakter" required>
                    </div>
                    <div>
                        <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-shield-alt mr-2"></i>Şifre Tekrar
                        </label>
                        <input type="password" class="form-control w-full" name="password_confirm" id="password_confirm" placeholder="Şifrenizi tekrar girin" required>
                    </div>
                </div>

                <div class="mt-6">
                    <button type="submit" class="btn-primary w-full py-3 text-lg">
                        <i class="fas fa-user-plus mr-2"></i>Kayıt Ol
                    </button>
                </div>
            </form>
            <div class="text-center mt-6 pt-4 border-t border-gray-200">
                <p class="text-gray-600">Zaten hesabınız var mı?
                  <a href="{{ url_for('auth.login') }}" class="text-primary-600 font-medium hover:text-primary-700 transition-colors">
                    <i class="fas fa-sign-in-alt mr-1"></i>Giriş Yap
                  </a>
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();

        function validateForm() {
            let isValid = true;
            const form = document.getElementById('registerForm');
            // E-posta kontrolü
            const email = document.getElementById('email');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                email.classList.add('is-invalid');
                isValid = false;
            } else {
                email.classList.remove('is-invalid');
            }
            // Telefon kontrolü
            const telefon = document.getElementById('telefon');
            const telefonRegex = /^[0-9]{10}$/;
            if (!telefonRegex.test(telefon.value)) {
                telefon.classList.add('is-invalid');
                isValid = false;
            } else {
                telefon.classList.remove('is-invalid');
            }
            // Şifre kontrolü
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('password_confirm');
            if (password.value.length < 6) {
                password.classList.add('is-invalid');
                isValid = false;
            } else {
                password.classList.remove('is-invalid');
            }
            if (password.value !== confirmPassword.value) {
                confirmPassword.classList.add('is-invalid');
                isValid = false;
            } else {
                confirmPassword.classList.remove('is-invalid');
            }
            return isValid;
        }
        // Form alanlarında değişiklik olduğunda doğrulama yap
        document.querySelectorAll('#registerForm input').forEach(input => {
            input.addEventListener('input', function() {
                if (this.classList.contains('is-invalid')) {
                    this.classList.remove('is-invalid');
                }
            });
        });
    </script>
</body>
</html>
